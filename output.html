<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TC-Presenter Output</title>
  <link rel="stylesheet" href="./view/slide.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #output-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* 대기 화면 */
    #standby {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div id="output-container">
  <div id="standby">STANDBY</div>
</div>

<script type="module">
  import { createPageView } from './view/PageView.js'

  const CHANNEL_NAME = 'tc-presenter-output'
  const container = document.getElementById('output-container')
  const standby = document.getElementById('standby')

  // ── BroadcastChannel 수신 ─────────────────
  const channel = new BroadcastChannel(CHANNEL_NAME)

  channel.onmessage = ({ data }) => {
    if (data.type === 'CLEAR') {
      showStandby()
      return
    }

    if (data.type === 'SHOW_PAGE') {
      showPage(data.page)
    }
  }

  // ── 렌더링 ───────────────────────────────
  function showPage(page) {
    container.innerHTML = ''
    // Future: media 수신 시 두 번째 인자로 전달
    container.appendChild(createPageView(page, null))
  }

  function showStandby() {
    container.innerHTML = ''
    container.appendChild(standby)
  }
</script>
</body>
</html>
