<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TC-Presenter Output</title>
  <link rel="stylesheet" href="./view/slide.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #output-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* 대기 화면 */
    #standby {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div id="output-container">
  <div id="standby">STANDBY</div>
</div>

<script type="module">
  import { createPageView } from './view/PageView.js'
  import { get as getMedia } from './media/MediaStore.js'
  import { fill as fillMediaCache, has as hasMediaCached, peek as peekMediaCache } from './media/MediaRuntimeCache.js'

  const CHANNEL_NAME = 'tc-presenter-output'
  const container = document.getElementById('output-container')
  const standby = document.getElementById('standby')

  // ── BroadcastChannel 수신 ─────────────────
  const channel = new BroadcastChannel(CHANNEL_NAME)

  channel.onmessage = ({ data }) => {
    if (data.type === 'CLEAR') {
      clearToStandby()
      return
    }

    if (data.type === 'SHOW_PAGE') {
      showPage(data.page)
    }
  }

  // Live가 이미 켜진 뒤 이 창을 나중에 여는 경우, 지나간 SHOW_PAGE를
  // 못 받아 STANDBY에 계속 멈춰있는 문제가 있었다(2026-07-02, 실사용
  // 발견 — 더블모니터로 Output을 나중에 연결하는 실제 운영 상황과 동일).
  // 메인 탭(output/BroadcastOutput.js)에 현재 상태 재전송을 요청한다.
  channel.postMessage({ type: 'REQUEST_SYNC' })

  // ── Media Resolve (Step6, 2026-06-27) ───────
  //
  // output.html은 메인 탭과 완전히 독립된 탭/창(별도 JS realm)이다. 메인
  // 탭에서 만든 blob URL은 여기서 쓸 수 없으므로, mediaId만 메시지로 받고
  // 이 탭 자신의 IndexedDB(MediaStore)와 자신의 MediaRuntimeCache로 직접
  // resolve한다(command/CommandBus.js의 preloadMedia()와 동일한 책임을
  // 이 탭에서 별도로 수행 — output.html은 CommandBus를 거치지 않는
  // BroadcastChannel 경로이기 때문에 같은 로직을 한 번 더 둘 수밖에 없다).
  //
  // 화면 갱신 정책(2026-06-27 합의): mediaId를 받으면 즉시 화면을 지우지
  // 않는다. resolve(IndexedDB 조회)가 끝날 때까지 현재 화면을 그대로
  // 유지하고, 끝나면 한 번에 새 Page로 교체한다. 로딩 UI/placeholder는
  // 이번 MVP 범위에서 넣지 않는다 — 라이브 방송 화면에서 빈 화면/깜빡임이
  // 잠깐의 구화면 유지보다 더 거슬린다는 판단.
  //
  // 순서 보장: CommandBus.js와 동일한 이유로 직렬 큐가 필요하다. 여러
  // SHOW_PAGE가 연달아 도착했을 때(예: CueList 빠른 연속 클릭), media
  // 있는 Page(IndexedDB 조회로 지연)와 media 없는 Page(즉시 처리)가
  // 섞이면 호출 순서와 화면 반영 순서가 달라질 수 있다 — command/
  // CommandBus.js의 D-019(Decisions.md)와 동일한 문제, 동일한 해법.
  //
  // CLEAR도 이 큐를 거친다. SHOW_PAGE(media, resolve 중) 다음에 CLEAR가
  // 도착했을 때 CLEAR를 즉시 처리해버리면, 한참 뒤 SHOW_PAGE의 resolve가
  // 끝나면서 standby 화면을 다시 덮어써 CLEAR가 무시된 것처럼 보이는
  // 문제가 생긴다 — CLEAR도 같은 큐에 태워 도착 순서대로 처리한다.
  let renderQueue = Promise.resolve()

  // 현재 표시 중인 .slide DOM 참조(Transition, 2026-07-11, TODO.md P2 항목).
  // container.querySelector로 "이전 슬라이드"를 다시 찾지 않는 이유: fade
  // 진행 중(이전 슬라이드가 페이드아웃 대기 중이라 아직 DOM에 남아있는
  // 상태)에 다음 SHOW_PAGE가 연달아 도착하면, DOM 순서 기준 조회는 아직
  // 안 지워진 "그 이전 이전" 슬라이드를 잘못 집어올 수 있다 — JS 변수로
  // "지금 진짜 보여지고 있는 슬라이드"를 직접 추적해야 연속 전환에서도
  // 정확하다.
  let currentSlideEl = null

  function showPage(page) {
    renderQueue = renderQueue.then(() => renderPage(page)).catch(() => {})
  }

  function clearToStandby() {
    renderQueue = renderQueue.then(() => showStandby()).catch(() => {})
  }

  async function renderPage(page) {
    let media = null

    if (page.mediaId) {
      media = await resolveMedia(page.mediaId)
    }

    // resolve가 끝난 뒤에만 화면을 교체한다 — 그 전까지는 직전 화면 유지.
    const newSlide = createPageView(page, media)

    // type이 'fade'이고 페이드해 들어올 대상(직전 슬라이드)이 실제로
    // 있을 때만 크로스페이드한다. 'none'/'cut'/미인식 값이거나 STANDBY
    // 직후 첫 Page라면(currentSlideEl이 없음) 기존과 동일한 즉시 교체
    // (cut)로 처리한다 — 지금까지의 기본 동작을 그대로 보존한다.
    const isFade = page.transition?.type === 'fade' && currentSlideEl

    if (isFade) {
      crossfadeToSlide(newSlide, page.transition.duration ?? 300)
    } else {
      container.innerHTML = ''
      container.appendChild(newSlide)
    }

    currentSlideEl = newSlide
  }

  /**
   * 이전 슬라이드 위에 새 슬라이드를 opacity 0으로 겹쳐 놓고 CSS
   * transition으로 1까지 올린 뒤, duration 후 이전 슬라이드를 제거한다.
   * 두 슬라이드가 같은 자리에 겹쳐야 하므로 이 전환 동안만 position을
   * absolute로 바꾼다(view/slide.css의 .slide 기본값은 relative — 평소
   * 한 번에 하나만 있을 때는 그걸로 충분하고, 이 파일은 크로스페이드가
   * 필요한 순간에만 인라인 스타일로 겹쳐 놓는다. 공용 CSS는 건드리지
   * 않는다 — index.html의 PreviewPanel도 같은 .slide 클래스를 쓴다).
   */
  function crossfadeToSlide(newSlide, duration) {
    const previousSlide = currentSlideEl

    newSlide.style.position = 'absolute'
    newSlide.style.inset = '0'
    newSlide.style.opacity = '0'
    newSlide.style.transition = `opacity ${duration}ms ease`
    previousSlide.style.position = 'absolute'
    previousSlide.style.inset = '0'

    container.appendChild(newSlide)
    void newSlide.offsetWidth // 강제 리플로우 — 없으면 브라우저가 opacity 0→1을 한 프레임에 묶어 애니메이션이 생략될 수 있다
    newSlide.style.opacity = '1'

    setTimeout(() => {
      // 이 사이에 또 다른 전환이 연달아 일어나 currentSlideEl이 이미
      // 다음 슬라이드로 바뀌었을 수 있다 — 그 최신 슬라이드는 절대
      // 건드리지 않고, 이 전환이 책임지는 previousSlide 하나만 정리한다.
      if (previousSlide.parentNode === container && previousSlide !== currentSlideEl) {
        container.removeChild(previousSlide)
      }
    }, duration)
  }

  /**
   * mediaId → blob URL. 이미 이 탭의 캐시에 있으면 IndexedDB를 다시
   * 읽지 않는다(command/CommandBus.js의 preloadMedia()와 동일한 패턴).
   */
  async function resolveMedia(mediaId) {
    if (hasMediaCached(mediaId)) {
      return peekMediaCache(mediaId)
    }

    const record = await getMedia(mediaId)
    if (!record) {
      console.warn('[output.html] mediaId에 해당하는 레코드를 찾을 수 없음:', mediaId)
      return null
    }

    return fillMediaCache(mediaId, record.blob)
  }

  // ── 렌더링 ───────────────────────────────
  function showStandby() {
    container.innerHTML = ''
    container.appendChild(standby)
    currentSlideEl = null // STANDBY로 돌아가면 "이전 슬라이드"가 없어진다 — 다음 Page는 항상 즉시 교체(cut)로 시작
  }
</script>
</body>
</html>
