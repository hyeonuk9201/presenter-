<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TC-Presenter-00 테스트</title>
  <link rel="stylesheet" href="./view/slide.css">
  <link rel="stylesheet" href="./ui/cuelist.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; padding: 24px; background: #1e1e1e; color: #d4d4d4; margin: 0; }
    h2 { color: #569cd6; margin-top: 32px; }
    .result { background: #2d2d2d; padding: 12px 16px; border-radius: 6px; margin: 8px 0; }
    .ok  { border-left: 4px solid #4ec9b0; }
    .err { border-left: 4px solid #f44747; }
    .log { border-left: 4px solid #569cd6; }
    .result pre { margin: 4px 0 0; white-space: pre-wrap; word-break: break-all; }
    button {
      margin: 4px; padding: 8px 16px;
      background: #0e639c; color: white;
      border: none; border-radius: 4px;
      cursor: pointer; font-family: monospace;
    }
    button:hover { background: #1177bb; }

    /* PageView 미리보기 */
    #preview-area { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .preview-card { width: 320px; height: 180px; border: 1px solid #444; border-radius: 4px; overflow: hidden; position: relative; }
    .preview-label { font-size: 11px; color: #888; margin-top: 4px; }

    /* CueList + PreviewPanel 레이아웃 */
    #cuelist-demo {
      display: grid;
      grid-template-columns: 240px 1fr 200px;
      gap: 16px;
      margin-top: 12px;
      height: 420px;
    }
    #cuelist-container {
      height: 100%;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
    }
    #preview-panel {
      height: 100%;
      border: 1px solid #4ec9b0;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .preview-blank {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 13px;
    }
    #cuelist-info {
      background: #2d2d2d; border-radius: 6px;
      padding: 16px; font-size: 13px; overflow-y: auto;
    }
    #cuelist-info h4 { margin: 0 0 8px; color: #569cd6; }
    #state-display { white-space: pre-wrap; color: #9cdcfe; }
    #output { margin-top: 16px; }
  </style>
</head>
<body>

<h1>TC-Presenter-00 · Walking Skeleton 테스트</h1>

<h2>1. 데이터 흐름 테스트</h2>
<button onclick="runAll()">전체 테스트 실행</button>
<button onclick="clearOutput()">출력 초기화</button>

<h2>2. 개별 테스트</h2>
<button onclick="testPageCreate()">Page 생성</button>
<button onclick="testStoreDispatch()">Store dispatch</button>
<button onclick="testSubscribe()">Subscribe 감지</button>
<button onclick="testGoLive()">GO_LIVE</button>
<button onclick="testRemovePage()">Page 삭제</button>
<button onclick="testLyricsImport()">가사 Import</button>

<h2>3. PageView 렌더링 테스트</h2>
<button onclick="testPageView()">PageView 렌더링</button>
<div id="preview-area"></div>

<h2>4. CueList + PreviewPanel + 송출 통합 테스트</h2>
<button onclick="setupCueListDemo()">가사 불러오기 (데모)</button>
<button onclick="addBlankPage()">빈 Page 추가</button>
<button onclick="clearPages()">전체 초기화</button>
<button onclick="window.open('./output.html', 'output', 'width=1280,height=720')">output.html 열기</button>
<p style="color:#888; font-size:13px; margin:4px 0">
  클릭 → LIVE 송출 (초록 테두리) · 오른쪽 패널에 슬라이드 렌더링 확인
</p>

<div id="cuelist-demo">
  <div id="cuelist-container">
    <div class="cue-list" id="cue-list-el"></div>
  </div>
  <div id="preview-panel"></div>
  <div id="cuelist-info">
    <h4>PresenterState</h4>
    <div id="state-display">—</div>
  </div>
</div>

<h2>5. 테스트 로그</h2>
<div id="output"></div>

<script type="module">
  import { createTextPage, isValidPage } from './domain/Page.js'
  import { dispatch, getState, subscribe, getLivePage } from './store/AppStore.js'
  import { importLyrics } from './utils/lyricsImport.js'
  import { createPageView } from './view/PageView.js'
  import { createCueList } from './ui/CueList.js'
  import { createPreviewPanel } from './ui/PreviewPanel.js'
  import { createBroadcastOutput } from './output/BroadcastOutput.js'

  // ── 출력 유틸 ──────────────────────────────────
  const out = document.getElementById('output')
  const previewArea = document.getElementById('preview-area')
  const stateDisplay = document.getElementById('state-display')

  function log(label, value, type = 'log') {
    const el = document.createElement('div')
    el.className = `result ${type}`
    const valStr = value === null ? '' : typeof value === 'string' ? value : JSON.stringify(value, null, 2)
    el.innerHTML = `<strong>${label}</strong>${valStr ? `<pre>${valStr}</pre>` : ''}`
    out.appendChild(el)
  }
  function ok(label, value)   { log('✅ ' + label, value, 'ok') }
  function err(label, value)  { log('❌ ' + label, value, 'err') }
  function info(label, value) { log('ℹ️  ' + label, value, 'log') }

  // ── CueList + PreviewPanel 초기화 ──────────────
  createCueList(document.getElementById('cue-list-el'))
  createPreviewPanel(document.getElementById('preview-panel'))
  createBroadcastOutput()

  // PresenterState 실시간 표시
  subscribe(({ state }) => {
    stateDisplay.textContent = JSON.stringify(state.presenterState, null, 2)
  })

  // ── 데모 조작 ──────────────────────────────────
  window.setupCueListDemo = () => {
    getState().presentation.pages.map(p => p.id)
      .forEach(id => dispatch({ type: 'REMOVE_PAGE', pageId: id }))
    const raw = `1절\n주께 감사해 할렐루야\n주께 감사해 아멘\n\n후렴\n찬양해 영원히\n찬양해 주님을\n\n2절\n주의 사랑 한없어라\n영원토록 찬양해\n\n브릿지\n할렐루야 아멘`
    importLyrics(raw).forEach(page => dispatch({ type: 'ADD_PAGE', page }))
  }

  window.addBlankPage = () => {
    dispatch({ type: 'ADD_PAGE', page: createTextPage({ text: '(새 페이지)' }) })
  }

  window.clearPages = () => {
    getState().presentation.pages.map(p => p.id)
      .forEach(id => dispatch({ type: 'REMOVE_PAGE', pageId: id }))
  }

  // ── 테스트 함수들 ──────────────────────────────
  window.clearOutput = () => { out.innerHTML = ''; previewArea.innerHTML = '' }

  window.testPageCreate = () => {
    info('=== Page 생성 테스트 ===')
    const page = createTextPage({ text: '주께 감사해' })
    page.id                     ? ok('id 생성됨', page.id)            : err('id 없음', page)
    page.type === 'text'        ? ok('type = text', page.type)        : err('type 오류', page.type)
    page.text === '주께 감사해' ? ok('text 저장됨', page.text)        : err('text 오류', page.text)
    page.fontSize               ? ok('fontSize 기본값', page.fontSize): err('fontSize 없음', page)
    isValidPage(page)           ? ok('isValidPage 통과', null)        : err('isValidPage 실패', page)
  }

  window.testStoreDispatch = () => {
    info('=== Store dispatch 테스트 ===')
    const before = getState().presentation.pages.length
    const page = createTextPage({ text: '할렐루야' })
    dispatch({ type: 'ADD_PAGE', page })
    const after = getState().presentation.pages.length
    after === before + 1 ? ok(`pages 추가됨 (${before} → ${after})`, null) : err('pages 추가 실패', null)
  }

  window.testSubscribe = () => {
    info('=== Subscribe 테스트 ===')
    let fired = false
    subscribe(({ action, state }) => {
      if (fired) return; fired = true
      ok('storeChanged 수신됨', { action: action.type, pageCount: state.presentation.pages.length })
    })
    dispatch({ type: 'ADD_PAGE', page: createTextPage({ text: '구독 테스트' }) })
    setTimeout(() => { if (!fired) err('이벤트 수신 안 됨', null) }, 100)
  }

  window.testGoLive = () => {
    info('=== GO_LIVE 테스트 ===')
    const page = createTextPage({ text: '라이브 테스트' })
    dispatch({ type: 'ADD_PAGE', page })
    dispatch({ type: 'GO_LIVE', pageId: page.id })
    const live = getLivePage()
    live && live.id === page.id ? ok('getLivePage() 정확함', live.text) : err('getLivePage() 실패', null)
  }

  window.testRemovePage = () => {
    info('=== Page 삭제 테스트 ===')
    const page = createTextPage({ text: '삭제될 페이지' })
    dispatch({ type: 'ADD_PAGE', page })
    dispatch({ type: 'GO_LIVE', pageId: page.id })
    getLivePage() ? ok('삭제 전 livePageId 확인', page.id) : err('삭제 전 live 없음', null)
    dispatch({ type: 'REMOVE_PAGE', pageId: page.id })
    getLivePage() === null ? ok('삭제 후 livePageId 자동 해제됨', null) : err('livePageId 해제 안 됨', null)
    const exists = getState().presentation.pages.find(p => p.id === page.id)
    exists ? err('Page 삭제 안 됨', null) : ok('Page 삭제 확인', null)
  }

  window.testLyricsImport = () => {
    info('=== 가사 Import 테스트 ===')
    const raw = `1절\n주께 감사해 할렐루야\n주께 감사해 아멘\n\n후렴\n찬양해 영원히\n찬양해 주님을\n\n브릿지\n할렐루야`
    const pages = importLyrics(raw)
    pages.length === 3
      ? ok('3개 Page 생성됨', pages.map(p => p.text.split('\n')[0]).join(' / '))
      : err(`Page 수 오류 (예상 3, 실제 ${pages.length})`, null)
  }

  window.testPageView = () => {
    info('=== PageView 렌더링 테스트 ===')
    previewArea.innerHTML = ''
    const samples = [
      createTextPage({ text: '주께 감사해\n할렐루야', verticalAlign: 'bottom' }),
      createTextPage({ text: '후렴\n찬양해 영원히', verticalAlign: 'middle' }),
      createTextPage({ text: '브릿지', verticalAlign: 'top', horizontalAlign: 'left', fontSize: 48 }),
    ]
    samples.forEach((page, i) => {
      const wrapper = document.createElement('div')
      wrapper.className = 'preview-card'
      wrapper.appendChild(createPageView(page))
      const label = document.createElement('div')
      label.className = 'preview-label'
      label.textContent = `Page[${i}] · ${page.verticalAlign} / ${page.horizontalAlign} / ${page.fontSize}px`
      const card = document.createElement('div')
      card.appendChild(wrapper)
      card.appendChild(label)
      previewArea.appendChild(card)
      ok(`PageView[${i}] 생성됨`, null)
    })
  }

  window.runAll = () => {
    clearOutput()
    info('=== 전체 테스트 시작 ===', new Date().toLocaleTimeString())
    testPageCreate()
    testStoreDispatch()
    testSubscribe()
    testGoLive()
    testRemovePage()
    testLyricsImport()
    info('=== 전체 테스트 완료 ===')
  }

  // 초기 데모 로드
  setupCueListDemo()
</script>
</body>
</html>
